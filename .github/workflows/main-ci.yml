name: Main CI-pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore practice2026.slnx

      - name: Build
        run: dotnet build practice2026.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test practice2026.slnx --no-build --configuration Release --verbosity normal
